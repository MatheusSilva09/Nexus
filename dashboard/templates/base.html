<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Hub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Copie aqui todo o bloco <style> que você enviou anteriormente */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #0f172a; color: #fff; min-height: 100vh; }
        
        .sidebar { width: 220px; height: 100vh; background: #020617; position: fixed; padding: 20px; border-right: 1px solid #1e293b; }
        .sidebar h2 { color: #10b981; margin-bottom: 30px; font-size: 1.5rem; }
        .sidebar ul { list-style: none; }
        .sidebar li a { color: #94a3b8; text-decoration: none; display: block; padding: 12px; margin: 5px 0; border-radius: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: #1e293b; color: #10b981; }
        .sidebar li.active a { background: #10b98122; color: #10b981; font-weight: bold; }

        .header { margin-left: 220px; padding: 20px 40px; background: #020617; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .main { margin-left: 220px; padding: 40px; }
        
        /* Seus estilos de cards, grids e botões que você enviou... */
        .profile-btn, .logout-btn { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; transition: 0.3s; }
        .profile-btn:hover, .logout-btn:hover { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Nexus Hub</h2>
        <ul>
            <li class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <a href="{% url 'home' %}">Painel</a>
            </li>
            <li class="{% if request.resolver_match.url_name == 'lista_estoque' %}active{% endif %}">
                <a href="{% url 'lista_estoque' %}">Estoque</a>
            </li>
            </ul>
    </div>

    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">{% block page_title %}Dashboard{% endblock %}</div>
        <div class="user-info" style="display: flex; align-items: center; gap: 20px;">
            <span>Bem-vindo, <strong>{{ user.username }}</strong>!</span>
            <div class="user-actions">
                <a href="/logout/" class="logout-btn">Sair</a>
            </div>
        </div>
    </div>

    <div class="main">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
