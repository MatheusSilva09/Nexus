{% extends 'base.html' %}
{% block content %}
<h2>Tem certeza que deseja excluir o cliente {{ cliente.nome }}?</h2>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmar Exclusão</button>
    <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
