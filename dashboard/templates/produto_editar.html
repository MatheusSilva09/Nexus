{% extends 'base.html' %}

{% block content %}
<h2>Editar Produto: {{ produto.nome }}</h2>

<form method="POST">
    {% csrf_token %}
    
    <div>
        <label>Nome:</label>
        <input type="text" name="nome" value="{{ produto.nome }}" required>
    </div>

    <div>
        <label>Preço:</label>
        <input type="number" step="0.01" name="preco" value="{{ produto.preco|stringformat:'.2f' }}" required>
    </div>

    <div>
        <label>Estoque Atual:</label>
        <input type="number" name="estoque" value="{{ produto.estoque }}" required>
    </div>

    <div>
        <label>Estoque Mínimo:</label>
        <input type="number" name="estoque_minimo" value="{{ produto.estoque_minimo }}">
    </div>

    <button type="submit">Salvar Alterações</button>
    <a href="{% url 'lista_estoque' %}">Cancelar</a>
</form>
{% endblock %}
