{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Clientes</h2>
    <a href="{% url 'adicionar_cliente' %}" class="btn btn-success">+ Novo Cliente</a>
</div>

<table class="table table-dark table-hover">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th class="text-center">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.email|default:"-" }}</td>
            <td>{{ cliente.telefone|default:"-" }}</td>
            <td class="text-center">
                <a href="{% url 'editar_cliente' cliente.id %}" class="btn btn-sm btn-outline-warning">Editar</a>
                <a href="{% url 'excluir_cliente' cliente.id %}" class="btn btn-sm btn-outline-danger">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
